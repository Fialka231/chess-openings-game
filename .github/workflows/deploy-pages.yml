name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect opening data changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            opening_data:
              - opening_trainer.py
              - requirements.txt
              - QueensPawn/**/*.zip
              - KingsPawn/**/*.zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore opening data cache
        id: data-cache
        uses: actions/cache/restore@v4
        with:
          path: static/data
          key: opening-data-${{ runner.os }}-${{ hashFiles('opening_trainer.py', 'requirements.txt', 'QueensPawn/**/*.zip', 'KingsPawn/**/*.zip') }}
          restore-keys: |
            opening-data-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decide whether opening data must be rebuilt
        id: rebuild
        run: |
          if [ "${{ steps.changes.outputs.opening_data }}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ -f static/data/database.json ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build opening database
        if: steps.rebuild.outputs.should_build == 'true'
        run: python opening_trainer.py build

      - name: Save opening data cache
        if: always() && steps.rebuild.outputs.should_build == 'true'
        uses: actions/cache/save@v4
        with:
          path: static/data
          key: ${{ steps.data-cache.outputs.cache-primary-key }}

      - name: Ensure Pages static hosting
        run: touch static/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
